name: Backend Tests

on:
  pull_request:
  push:
    branches:
      - 'ci/add-ruff-linting'

jobs:
  check_paths:
    #runs-on: ubuntu-latest # change to self-hosted runners
    runs-on: homelab-runners
    outputs:
      should_run: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      # https://github.com/dorny/paths-filter
      - uses: dorny/paths-filter@v3.0.2 # could this be done without 3rd party GHA?
        id: filter
        with:
          filters: |
            backend:
              - 'src/backend/**'
              - '.github/workflows/backend-tests.yaml'

  test:
    name: Test Backend
    needs: check_paths
    if: ${{ needs.check_paths.outputs.should_run == 'true' }}
    #runs-on: ubuntu-latest
    runs-on: homelab-runners
    defaults:
      run:
        working-directory: ./src/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v5

      - name: Install Ruff
        uses: astral-sh/ruff-action@v4.0.0

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: |
          uv sync --locked --dev

      - name: Lint with Ruff
        run: |
          uv run ruff check --output-format=github --target-version=py313 src tests
          uv run ruff format --diff --check --target-version=py313 src tests

